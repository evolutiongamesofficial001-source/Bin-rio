<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PI Chat</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-messaging-compat.js"></script>

<style>
*{box-sizing:border-box;}
body{margin:0;background:#000;color:#00ff88;font-family:Arial;}
#app{height:100vh;display:flex;flex-direction:column;}
.header{padding:15px;border-bottom:1px solid #00ff88;display:flex;justify-content:space-between;}
.lista{flex:1;overflow:auto;}
.contato{padding:15px;border-bottom:1px solid rgba(0,255,136,.2);cursor:pointer;}
.chat-box{flex:1;overflow:auto;padding:10px;display:flex;flex-direction:column;}
.msg{padding:10px;margin:5px;border-radius:12px;max-width:75%;}
.me{background:#00ff88;color:black;align-self:flex-end;}
.other{background:#111;}
.nomeGrupo{color:red;font-size:12px;}
.time{font-size:10px;opacity:.6;text-align:right;}
.chat-input{display:flex;gap:5px;padding:10px;}
.chat-input input{flex:1;padding:10px;border-radius:20px;background:#111;color:#0f0;border:none;}
button{background:#00ff88;color:black;border:none;padding:10px;border-radius:10px;}
</style>
</head>

<body>
<div id="app"></div>

<script>

const firebaseConfig = {
 databaseURL:"https://piri-82dcf-default-rtdb.firebaseio.com/"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const messaging = firebase.messaging();

const app = document.getElementById("app");

let user = localStorage.getItem("user");
let contatoAtual = "";

// 🔔 NOTIFICAÇÃO
function ativarNotificacao(){
Notification.requestPermission().then(p=>{
if(p==="granted"){
messaging.getToken({
vapidKey:"COLOQUE_SUA_VAPID_KEY_AQUI"
}).then(t=>{
db.ref("tokens/"+user).set(t);
});
}
});
}

messaging.onMessage(payload=>{
new Notification(payload.notification.title,{
body:payload.notification.body
});
});

// REGISTRO
function telaRegistro(){
app.innerHTML=`
<div class="header">Criar Conta</div>
<div style="padding:10px">
<input id="nome" placeholder="Nome único">
<button onclick="registrar()">Entrar</button>
</div>`;
}

function registrar(){
let nome=document.getElementById("nome").value.trim();

db.ref("users").once("value",snap=>{
let users=snap.val()||{};
if(Object.values(users).includes(nome)){
alert("Nome já existe!");
return;
}

db.ref("users").push(nome);
localStorage.setItem("user",nome);
user=nome;

setOnline();
ativarNotificacao();
telaHub();
});
}

// ONLINE
function setOnline(){
let ref=db.ref("status/"+user);
db.ref(".info/connected").on("value",snap=>{
if(snap.val()){
ref.set({online:true});
ref.onDisconnect().set({online:false});
}
});
}

// HUB
function telaHub(){
app.innerHTML=`
<div class="header">PI Chat - ${user}</div>

<div style="padding:10px">
<input id="contato" placeholder="Nome do contato">
<button onclick="abrirChat(document.getElementById('contato').value)">Conversar</button>
<button onclick="criarGrupo()">Criar Grupo</button>
<button onclick="entrarGrupo()">Entrar em Grupo</button>
</div>

<div id="lista" class="lista"></div>
`;

carregarContatos();
}

// CRIAR GRUPO
function criarGrupo(){
let nome = prompt("Nome do grupo:");
if(!nome) return;

let id = "grupo_"+Date.now();

db.ref("grupos/"+id).set({
nome:nome,
membros:[user]
});

add(user,id);

alert("Grupo criado!\nID: "+id);
}

// ENTRAR GRUPO
function entrarGrupo(){
let id = prompt("Digite o ID do grupo:");

if(!id || !id.startsWith("grupo_")){
alert("ID inválido");
return;
}

db.ref("grupos/"+id).once("value",snap=>{
if(!snap.exists()){
alert("Grupo não existe");
return;
}

let membros = snap.val().membros || [];

if(!membros.includes(user)){
membros.push(user);
db.ref("grupos/"+id+"/membros").set(membros);
}

add(user,id);

alert("Entrou no grupo!");
});
}

// SAIR
function sairGrupo(id){
db.ref("grupos/"+id+"/membros").once("value",snap=>{
let m=snap.val()||[];
m=m.filter(x=>x!==user);
db.ref("grupos/"+id+"/membros").set(m);
});

db.ref("contatos/"+user).once("value",s=>{
let lista=s.val()||[];
lista=lista.filter(c=>c!==id);
db.ref("contatos/"+user).set(lista);
});

telaHub();
}

// CONTATOS
function carregarContatos(){
db.ref("contatos/"+user).on("value",snap=>{
renderLista(snap.val()||[]);
});
}

// 🔥 CORRIGIDO (SEM BUG)
function renderLista(lista){
let container = document.getElementById("lista");
container.innerHTML = "";

lista.forEach(c=>{
let isGrupo = c.startsWith("grupo_");

if(isGrupo){
db.ref("grupos/"+c).once("value",snap=>{
let nome = snap.val()?.nome || "Grupo";

container.innerHTML += `
<div class="contato" onclick="abrirChat('${c}')">
<div style="color:#00aaff">👥 ${nome}</div>
</div>`;
});
}else{
container.innerHTML += `
<div class="contato" onclick="abrirChat('${c}')">
<div>👤 ${c}</div>
</div>`;
}
});
}

// CHAT
function abrirChat(nome){
contatoAtual=nome;
let isGrupo=nome.startsWith("grupo_");
let chatId=isGrupo?nome:[user,nome].sort().join("_");

app.innerHTML=`
<div class="header">
<span onclick="telaHub()">⬅️</span>
<span id="topo">${nome}</span>
${isGrupo?`<button onclick="sairGrupo('${nome}')">Sair</button>`:""}
</div>

<div id="msgs" class="chat-box"></div>

<div class="chat-input">
<input id="msg" placeholder="Mensagem">
<button onclick="enviar()">➤</button>
</div>
`;

if(isGrupo){
db.ref("grupos/"+nome).once("value",snap=>{
let g=snap.val();
if(g) document.getElementById("topo").innerText="👥 "+g.nome;
});
}

db.ref("chats/"+chatId).on("value",snap=>{
let msgs=snap.val()||{};
let html="";

Object.values(msgs).forEach(m=>{
let hora=new Date(m.time).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});

html+=`
<div class="msg ${m.de===user?'me':'other'}">
${isGrupo?`<div class="nomeGrupo">${m.de}</div>`:""}
${m.texto||""}
<div class="time">${hora}</div>
</div>`;
});

let box=document.getElementById("msgs");
box.innerHTML=html;
box.scrollTop=box.scrollHeight;
});
}

// ENVIAR
function enviar(){
let texto=document.getElementById("msg").value.trim();
if(!texto) return;

let isGrupo=contatoAtual.startsWith("grupo_");
let chatId=isGrupo?contatoAtual:[user,contatoAtual].sort().join("_");

db.ref("chats/"+chatId).push({
de:user,
texto,
time:Date.now()
});

document.getElementById("msg").value="";
}

// AUTO ADD
function add(d,c){
db.ref("contatos/"+d).once("value",s=>{
let lista=s.val()||[];
if(!lista.includes(c)){
lista.push(c);
db.ref("contatos/"+d).set(lista);
}
});
}

// START
if(!user){
telaRegistro();
}else{
setOnline();
ativarNotificacao();
telaHub();
}

</script>
</body>
</html>
