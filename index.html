<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PI Chat</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>
*{box-sizing:border-box;}

body{
margin:0;
background:#000;
color:#00ff88;
font-family:Arial;
}

/* APP */
#app{
height:100vh;
display:flex;
flex-direction:column;
}

/* HEADER */
.header{
padding:14px;
border-bottom:1px solid rgba(0,255,136,.2);
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(0,0,0,.8);
backdrop-filter:blur(8px);
font-weight:bold;
letter-spacing:.5px;
}

/* LISTA */
.lista{
flex:1;
overflow:auto;
}

.contato{
padding:14px;
border-bottom:1px solid rgba(0,255,136,.08);
cursor:pointer;
transition:.2s;
border-radius:8px;
margin:4px 8px;
}

.contato:hover{
background:rgba(0,255,136,.06);
transform:scale(1.01);
}

.contato small{
display:block;
opacity:.6;
font-size:12px;
margin-top:4px;
}

/* CHAT */
.chat-box{
flex:1;
overflow:auto;
padding:10px;
display:flex;
flex-direction:column;
}

/* MENSAGENS */
.msg{
padding:10px;
margin:6px;
border-radius:14px;
max-width:75%;
animation:fade .2s ease;
}

@keyframes fade{
from{opacity:0;transform:translateY(6px);}
to{opacity:1;transform:translateY(0);}
}

.me{
background:linear-gradient(135deg,#00ff88,#00cc6a);
color:#000;
align-self:flex-end;
box-shadow:0 0 8px rgba(0,255,136,.4);
}

.other{
background:#111;
border:1px solid rgba(0,255,136,.1);
}

.nomeGrupo{
color:#00aaff;
font-size:11px;
margin-bottom:3px;
}

.time{
font-size:10px;
opacity:.5;
text-align:right;
margin-top:4px;
}

/* INPUT */
.chat-input{
display:flex;
gap:8px;
padding:10px;
background:#000;
border-top:1px solid rgba(0,255,136,.1);
}

.chat-input input{
flex:1;
padding:12px;
border-radius:20px;
background:#111;
color:#0f0;
border:none;
outline:none;
transition:.2s;
}

.chat-input input:focus{
background:#151515;
box-shadow:0 0 6px rgba(0,255,136,.3);
}

/* BOTÃO */
button{
background:linear-gradient(135deg,#00ff88,#00cc6a);
color:#000;
border:none;
padding:10px 14px;
border-radius:10px;
cursor:pointer;
transition:.2s;
font-weight:bold;
}

button:hover{
transform:scale(1.05);
box-shadow:0 0 10px rgba(0,255,136,.4);
}

button:active{
transform:scale(.95);
}

/* SCROLL */
::-webkit-scrollbar{
width:5px;
}
::-webkit-scrollbar-thumb{
background:#00ff88;
border-radius:10px;
}
</style>
</head>

<body>
<div id="app"></div>

<script>

const firebaseConfig = {
 databaseURL:"https://piri-82dcf-default-rtdb.firebaseio.com/"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const app = document.getElementById("app");

let user = localStorage.getItem("user");
let contatoAtual = "";

// ================= REGISTRO =================
function telaRegistro(){
app.innerHTML=`
<div class="header">Criar Conta</div>
<div style="padding:12px">
<input id="nome" placeholder="Nome único">
<button onclick="registrar()">Entrar</button>
</div>`;
}

function registrar(){
let nome=document.getElementById("nome").value.trim();
if(!nome) return alert("Digite um nome");

db.ref("users").once("value",snap=>{
let users=snap.val()||{};
if(Object.values(users).includes(nome)){
alert("Nome já existe!");
return;
}

db.ref("users").push(nome);
localStorage.setItem("user",nome);
user=nome;

setOnline();
telaHub();
});
}

// ================= ONLINE =================
function setOnline(){
let ref=db.ref("status/"+user);
db.ref(".info/connected").on("value",snap=>{
if(snap.val()){
ref.set({online:true});
ref.onDisconnect().set({online:false});
}
});
}

// ================= HUB =================
function telaHub(){
app.innerHTML=`
<div class="header">PI Chat - ${user}</div>

<div style="padding:10px">
<input id="contato" placeholder="Nome do contato">
<button onclick="abrirChatPrivado()">Conversar</button>
<button onclick="criarGrupo()">Grupo</button>
</div>

<div id="lista" class="lista"></div>
`;

carregarContatos();
}

function abrirChatPrivado(){
let nome = document.getElementById("contato").value.trim();
if(!nome) return;

db.ref("users").once("value",snap=>{
let users = Object.values(snap.val()||{});

if(!users.includes(nome)){
alert("Usuário não existe!");
return;
}

add(user,nome);
add(nome,user);

abrirChat(nome);
});
}

// ================= GRUPOS =================
function criarGrupo(){
let nome = prompt("Nome do grupo:");
if(!nome) return;

let id = "grupo_"+Date.now();

db.ref("grupos/"+id).set({
nome:nome,
membros:[user]
});

add(user,id);
alert("ID: "+id);
}

// ================= CONTATOS =================
function carregarContatos(){
db.ref("contatos/"+user).on("value",snap=>{
renderLista(snap.val()||[]);
});
}

async function renderLista(lista){
let container = document.getElementById("lista");
container.innerHTML = "";

for(let c of lista){

let isGrupo = c.startsWith("grupo_");
let nome = c;
let ultimaMsg = "";
let hora = "";

let chatId = isGrupo ? c : [user,c].sort().join("_");

let snap = await db.ref("chats/"+chatId).limitToLast(1).once("value");
let msgs = snap.val();

if(msgs){
let m = Object.values(msgs)[0];
ultimaMsg = m.texto;
hora = new Date(m.time).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
}

if(isGrupo){
let g = await db.ref("grupos/"+c).once("value");
nome = "👥 "+(g.val()?.nome || "Grupo");
}else{
nome = "👤 "+c;
}

let div = document.createElement("div");
div.className="contato";
div.onclick=()=>abrirChat(c);

div.innerHTML=`
<div>${nome}</div>
<small>${ultimaMsg || ""} ${hora}</small>
`;

container.appendChild(div);
}
}

// ================= CHAT =================
function abrirChat(nome){
contatoAtual=nome;

let isGrupo=nome.startsWith("grupo_");
let chatId=isGrupo?nome:[user,nome].sort().join("_");

app.innerHTML=`
<div class="header">
<span onclick="telaHub()">⬅️</span>
<span id="topo">${nome}</span>
</div>

<div id="msgs" class="chat-box"></div>

<div class="chat-input">
<input id="msg" placeholder="Mensagem">
<button onclick="enviar()">➤</button>
</div>
`;

if(isGrupo){
db.ref("grupos/"+nome).once("value",snap=>{
let g=snap.val();
if(g) document.getElementById("topo").innerText="👥 "+g.nome;
});
}

db.ref("chats/"+chatId).on("value",snap=>{
let msgs=snap.val()||{};
let html="";

Object.values(msgs).forEach(m=>{
let hora=new Date(m.time).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});

html+=`
<div class="msg ${m.de===user?'me':'other'}">
${isGrupo?`<div class="nomeGrupo">${m.de}</div>`:""}
${m.texto}
<div class="time">${hora}</div>
</div>`;
});

let box=document.getElementById("msgs");
box.innerHTML=html;
box.scrollTop=box.scrollHeight;
});
}

// ================= ENVIAR =================
function enviar(){
let input=document.getElementById("msg");
let texto=input.value.trim();
if(!texto) return;

let isGrupo=contatoAtual.startsWith("grupo_");
let chatId=isGrupo?contatoAtual:[user,contatoAtual].sort().join("_");

db.ref("chats/"+chatId).push({
de:user,
texto,
time:Date.now()
});

input.value="";
}

// ================= AUTO ADD =================
function add(d,c){
db.ref("contatos/"+d).once("value",s=>{
let lista=s.val()||[];
if(!lista.includes(c)){
lista.push(c);
db.ref("contatos/"+d).set(lista);
}
});
}

// ================= START =================
if(!user){
telaRegistro();
}else{
setOnline();
telaHub();
}

</script>
</body>
</html>
