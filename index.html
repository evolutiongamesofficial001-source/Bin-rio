<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PI Chat</title>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>
*{box-sizing:border-box;}
body{margin:0;background:#000;color:#00ff88;font-family:Arial;}

#app{height:100vh;display:flex;flex-direction:column;}

.header{
padding:15px;
border-bottom:1px solid #00ff88;
display:flex;
align-items:center;
gap:10px;
}

.lista{flex:1;overflow:auto;}

.contato{
padding:15px;
border-bottom:1px solid rgba(0,255,136,.2);
display:flex;
justify-content:space-between;
cursor:pointer;
}

.status{font-size:12px;}

.chat-box{
flex:1;
overflow:auto;
padding:10px;
display:flex;
flex-direction:column;
}

.msg{
padding:10px;
margin:5px;
border-radius:12px;
max-width:75%;
animation:msgAnim .2s;
}

.me{background:#00ff88;color:black;align-self:flex-end;}
.other{background:#111;}

.time{font-size:10px;opacity:.6;text-align:right;}

img{max-width:200px;border-radius:10px;}

@keyframes msgAnim{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;}
}

.chat-input{
display:flex;
gap:5px;
padding:10px;
}

.chat-input input{
flex:1;
padding:10px;
border:none;
border-radius:20px;
background:#111;
color:#0f0;
}

.file-btn{
width:40px;height:40px;
background:#111;
border-radius:50%;
display:flex;align-items:center;justify-content:center;
}

#img{display:none;}

.send-btn{
width:45px;height:45px;
background:#00ff88;
border:none;border-radius:50%;
}

input,button{
width:100%;
padding:10px;
margin:5px 0;
background:#111;
border:none;
border-radius:10px;
color:#0f0;
}
button{background:#00ff88;color:black;}
</style>
</head>

<body>

<div id="app"></div>

<script>

const firebaseConfig = {
 databaseURL:"https://piri-82dcf-default-rtdb.firebaseio.com/"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const app = document.getElementById("app");

let user = localStorage.getItem("user");
let contatoAtual = "";

// REGISTRO
function telaRegistro(){
app.innerHTML=`
<div class="header">Criar Conta</div>
<div style="padding:10px">
<input id="nome" placeholder="Nome único">
<button onclick="registrar()">Entrar</button>
</div>`;
}

function registrar(){
let nome=document.getElementById("nome").value.trim();

db.ref("users").once("value",snap=>{
let users=snap.val()||{};
if(Object.values(users).includes(nome)){
alert("Nome já existe!");
return;
}

db.ref("users").push(nome);
localStorage.setItem("user",nome);
user=nome;

setOnline();
telaHub();
});
}

// ONLINE
function setOnline(){
let ref=db.ref("status/"+user);

db.ref(".info/connected").on("value",snap=>{
if(snap.val()){
ref.set({online:true});
ref.onDisconnect().set({online:false});
}
});
}

// HUB
function telaHub(){
app.innerHTML=`
<div class="header">PI Chat - ${user}</div>

<div style="padding:10px">
<input id="contato" placeholder="Nome do contato">
<button onclick="abrirChat(document.getElementById('contato').value)">Conversar</button>
</div>

<div id="lista" class="lista"></div>
`;

carregarContatos();
}

// LOCAL
function salvarLocal(lista){
localStorage.setItem("contatos_"+user,JSON.stringify(lista));
}

function carregarLocal(){
return JSON.parse(localStorage.getItem("contatos_"+user)||"[]");
}

// CONTATOS
function carregarContatos(){
renderLista(carregarLocal());

db.ref("contatos/"+user).on("value",snap=>{
let lista=snap.val()||[];
salvarLocal(lista);
renderLista(lista);
});
}

// LISTA
function renderLista(lista){
let html="";

lista.forEach(c=>{
html+=`
<div class="contato" onclick="abrirChat('${c}')">
<div>${c}</div>
<div class="status" id="s_${c}">...</div>
</div>`;
});

document.getElementById("lista").innerHTML=html;

// STATUS
lista.forEach(c=>{
db.ref("status/"+c).on("value",snap=>{
let el=document.getElementById("s_"+c);
if(el){
el.innerText=snap.val()?.online?"🟢 online":"⚫ offline";
}
});

// DIGITANDO NA LISTA
db.ref("typing").on("value",snap=>{
let typing=snap.val()||{};
let digitando=false;

Object.values(typing).forEach(chat=>{
if(chat[c]) digitando=true;
});

let el=document.getElementById("s_"+c);
if(el && digitando){
el.innerText="⌨️ digitando...";
}
});
});
}

// CHAT
function abrirChat(nome){

contatoAtual=nome;
let chatId=[user,nome].sort().join("_");

app.innerHTML=`
<div class="header">
<span onclick="telaHub()" style="cursor:pointer;">⬅️</span>
<span id="topo">${nome}</span>
</div>

<div id="msgs" class="chat-box"></div>

<div class="chat-input">
<label class="file-btn">📎
<input type="file" id="img" accept="image/*">
</label>

<input id="msg" placeholder="Mensagem" oninput="digitando()">

<button class="send-btn" onclick="enviar()">➤</button>
</div>
`;

// DIGITANDO TOPO
let typingAnim;

db.ref("typing/"+chatId+"/"+nome).on("value",snap=>{
let topo=document.getElementById("topo");

if(snap.val()){
let p=0;
clearInterval(typingAnim);

typingAnim=setInterval(()=>{
p=(p+1)%4;
topo.innerText=nome+" digitando"+".".repeat(p);
},500);

}else{
clearInterval(typingAnim);
topo.innerText=nome;
}
});

// MENSAGENS
db.ref("chats/"+chatId).on("value",snap=>{
let msgs=snap.val()||{};
let html="";

Object.values(msgs).forEach(m=>{
let hora=new Date(m.time||Date.now())
.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});

html+=`
<div class="msg ${m.de===user?'me':'other'}">
${m.texto||""}
${m.img?`<img src="${m.img}">`:""}
<div class="time">${hora}</div>
</div>`;
});

let box=document.getElementById("msgs");
box.innerHTML=html;
box.scrollTop=box.scrollHeight;
});
}

// DIGITANDO
function digitando(){
let chatId=[user,contatoAtual].sort().join("_");

db.ref("typing/"+chatId+"/"+user).set(true);

clearTimeout(window.t);
window.t=setTimeout(()=>{
db.ref("typing/"+chatId+"/"+user).set(false);
},1000);
}

// ENVIAR
function enviar(){

let inputMsg=document.getElementById("msg");
let inputImg=document.getElementById("img");

let texto=inputMsg.value.trim();
let file=inputImg.files[0];

if(!texto && !file) return;

let chatId=[user,contatoAtual].sort().join("_");

// AUTO CONTATO
add(user,contatoAtual);
add(contatoAtual,user);

if(file){
let reader=new FileReader();
reader.onload=()=>salvar(texto,reader.result);
reader.readAsDataURL(file);
}else{
salvar(texto,"");
}

function salvar(texto,img){
db.ref("chats/"+chatId).push({
de:user,
texto,
img,
time:Date.now()
});

// LIMPA (CORREÇÃO BUG)
inputMsg.value="";
inputImg.value="";
}
}

// AUTO ADD CONTATO
function add(d,c){
db.ref("contatos/"+d).once("value",s=>{
let lista=s.val()||[];

if(!lista.includes(c)){
lista.push(c);
db.ref("contatos/"+d).set(lista);
}
});
}

// START
if(!user){
telaRegistro();
}else{
setOnline();
telaHub();
}

</script>

</body>
</html>
